<svg viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">
  <!-- Row 1: 核心实体表 -->

  <!-- sessions -->
  <rect x="20" y="20" width="150" height="92" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.18)" stroke-width="1" rx="4"/>
  <text x="95" y="40" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="13" fill="rgba(245,243,238,0.95)">sessions</text>
  <line x1="30" y1="48" x2="160" y2="48" stroke="rgba(255,255,255,0.08)"/>
  <text x="30" y="63" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">id, title, project</text>
  <text x="30" y="76" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">started_at, ended_at</text>
  <text x="30" y="89" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">git_branch, version</text>
  <text x="30" y="102" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">message_count, source</text>

  <!-- messages (中心表，stroke 稍粗) -->
  <rect x="200" y="20" width="160" height="142" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.22)" stroke-width="1.2" rx="4"/>
  <text x="280" y="40" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="13" fill="rgba(245,243,238,0.95)">messages</text>
  <line x1="210" y1="48" x2="350" y2="48" stroke="rgba(255,255,255,0.08)"/>
  <text x="210" y="63" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">uuid, session_id</text>
  <text x="210" y="76" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">parent_uuid, type</text>
  <text x="210" y="89" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">role, text, model</text>
  <text x="210" y="102" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">timestamp, agent_id</text>
  <text x="210" y="115" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">is_meta, is_sidechain</text>
  <text x="210" y="128" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">input/output_tokens</text>
  <text x="210" y="141" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">cwd, skill, source</text>
  <text x="210" y="154" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">turn_duration_ms</text>

  <!-- tool_calls -->
  <rect x="390" y="20" width="150" height="92" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.18)" stroke-width="1" rx="4"/>
  <text x="465" y="40" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="13" fill="rgba(245,243,238,0.95)">tool_calls</text>
  <line x1="400" y1="48" x2="530" y2="48" stroke="rgba(255,255,255,0.08)"/>
  <text x="400" y="63" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">id, message_uuid</text>
  <text x="400" y="76" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">session_id, name</text>
  <text x="400" y="89" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">input_json</text>
  <text x="400" y="102" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">file_path</text>

  <!-- tool_results -->
  <rect x="560" y="20" width="100" height="92" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.18)" stroke-width="1" rx="4"/>
  <text x="610" y="40" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="12" fill="rgba(245,243,238,0.95)">tool_results</text>
  <line x1="570" y1="48" x2="650" y2="48" stroke="rgba(255,255,255,0.08)"/>
  <text x="570" y="63" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(200,195,184,0.6)">tool_use_id</text>
  <text x="570" y="76" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(200,195,184,0.6)">message_uuid</text>
  <text x="570" y="89" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(200,195,184,0.6)">content</text>
  <text x="570" y="102" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(200,195,184,0.6)">is_error, file_path</text>

  <!-- Row 2: 衍生 / 派生表 -->

  <!-- workflows -->
  <rect x="20" y="200" width="150" height="120" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.18)" stroke-width="1" rx="4"/>
  <text x="95" y="220" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="13" fill="rgba(245,243,238,0.95)">workflows</text>
  <line x1="30" y1="228" x2="160" y2="228" stroke="rgba(255,255,255,0.08)"/>
  <text x="30" y="243" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">run_id, session_id</text>
  <text x="30" y="256" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">workflow_name</text>
  <text x="30" y="269" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">task_id, script</text>
  <text x="30" y="282" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">status, agent_count</text>
  <text x="30" y="295" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">duration_ms, tokens</text>
  <text x="30" y="308" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">result_json</text>

  <!-- subagents -->
  <rect x="200" y="200" width="160" height="80" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.18)" stroke-width="1" rx="4"/>
  <text x="280" y="220" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="13" fill="rgba(245,243,238,0.95)">subagents</text>
  <line x1="210" y1="228" x2="350" y2="228" stroke="rgba(255,255,255,0.08)"/>
  <text x="210" y="243" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">agent_id, session_id</text>
  <text x="210" y="256" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">parent_tool_use_id</text>
  <text x="210" y="269" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">agent_type, description</text>

  <!-- workflow_agents -->
  <rect x="390" y="200" width="150" height="120" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.18)" stroke-width="1" rx="4"/>
  <text x="465" y="220" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="13" fill="rgba(245,243,238,0.95)">workflow_agents</text>
  <line x1="400" y1="228" x2="530" y2="228" stroke="rgba(255,255,255,0.08)"/>
  <text x="400" y="243" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">agent_id, run_id</text>
  <text x="400" y="256" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">session_id, label</text>
  <text x="400" y="269" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">phase, model, state</text>
  <text x="400" y="282" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">duration_ms, tokens</text>
  <text x="400" y="295" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">tool_calls</text>
  <text x="400" y="308" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">agent_type</text>

  <!-- summaries -->
  <rect x="560" y="200" width="100" height="80" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.18)" stroke-width="1" rx="4"/>
  <text x="610" y="220" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="12" fill="rgba(245,243,238,0.95)">summaries</text>
  <line x1="570" y1="228" x2="650" y2="228" stroke="rgba(255,255,255,0.08)"/>
  <text x="570" y="243" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(200,195,184,0.6)">id, session_id</text>
  <text x="570" y="256" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(200,195,184,0.6)">timestamp</text>
  <text x="570" y="269" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(200,195,184,0.6)">source, content</text>

  <!-- Row 3: 特殊层 -->

  <!-- memories (紫色高亮) -->
  <rect x="20" y="360" width="200" height="135" fill="rgba(167,139,250,0.06)" stroke="rgba(167,139,250,0.4)" stroke-width="1.2" rx="4"/>
  <text x="120" y="380" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="13" fill="#c4b5fd">memories</text>
  <line x1="30" y1="388" x2="210" y2="388" stroke="rgba(255,255,255,0.08)"/>
  <text x="30" y="403" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.62)">id, project, session_id</text>
  <text x="30" y="416" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.62)">message_start..end</text>
  <text x="30" y="429" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.62)">path, anchors, summary</text>
  <text x="30" y="442" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.62)">created_at</text>
  <text x="30" y="458" font-family="JetBrains Mono, monospace" font-size="9.5" fill="#c4b5fd">deleted_at, deleted_reason</text>
  <text x="30" y="478" font-family="JetBrains Mono, monospace" font-size="8.5" fill="rgba(167,139,250,0.7)">archive-only (soft delete)</text>

  <!-- index_state (虚线灰，表示元数据表) -->
  <rect x="250" y="360" width="160" height="80" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="3,2" rx="4"/>
  <text x="330" y="380" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="13" fill="rgba(245,243,238,0.95)">index_state</text>
  <line x1="260" y1="388" x2="400" y2="388" stroke="rgba(255,255,255,0.08)"/>
  <text x="260" y="403" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">jsonl_path (PK)</text>
  <text x="260" y="416" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">mtime</text>
  <text x="260" y="429" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(200,195,184,0.6)">lines_processed</text>

  <!-- messages_fts (蓝色虚线) -->
  <rect x="440" y="360" width="220" height="60" fill="rgba(56,189,248,0.06)" stroke="rgba(56,189,248,0.4)" stroke-width="1.2" stroke-dasharray="4,3" rx="4"/>
  <text x="550" y="380" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="13" fill="#7dd3fc">messages_fts</text>
  <line x1="450" y1="388" x2="650" y2="388" stroke="rgba(255,255,255,0.08)"/>
  <text x="450" y="403" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(125,211,252,0.7)">FTS5 virtual table</text>
  <text x="450" y="416" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(200,195,184,0.55)">content=messages, text</text>

  <!-- memories_fts (蓝色虚线) -->
  <rect x="440" y="430" width="220" height="60" fill="rgba(56,189,248,0.06)" stroke="rgba(56,189,248,0.4)" stroke-width="1.2" stroke-dasharray="4,3" rx="4"/>
  <text x="550" y="450" text-anchor="middle" font-family="Iowan Old Style, Georgia, serif" font-size="13" fill="#7dd3fc">memories_fts</text>
  <line x1="450" y1="458" x2="650" y2="458" stroke="rgba(255,255,255,0.08)"/>
  <text x="450" y="473" font-family="JetBrains Mono, monospace" font-size="9.5" fill="rgba(125,211,252,0.7)">FTS5 virtual table</text>
  <text x="450" y="486" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(200,195,184,0.55)">content=memories, path/summary</text>

  <!-- 箭头 -->

  <!-- Row 1 横向：sessions → messages → tool_calls → tool_results -->
  <line x1="170" y1="66" x2="200" y2="66" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
  <polygon points="200,66 194,63 194,69" fill="rgba(167,139,250,0.7)"/>
  <line x1="360" y1="66" x2="390" y2="66" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
  <polygon points="390,66 384,63 384,69" fill="rgba(167,139,250,0.7)"/>
  <line x1="540" y1="66" x2="560" y2="66" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
  <polygon points="560,66 554,63 554,69" fill="rgba(167,139,250,0.7)"/>

  <!-- 纵向：messages → subagents -->
  <line x1="280" y1="162" x2="280" y2="200" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
  <polygon points="280,200 277,194 283,194" fill="rgba(167,139,250,0.7)"/>

  <!-- 斜线：tool_calls → subagents (parent_tool_use_id) -->
  <line x1="420" y1="112" x2="350" y2="240" stroke="rgba(167,139,250,0.35)" stroke-width="1" stroke-dasharray="2,2"/>
  <polygon points="350,240 354,234 357,239" fill="rgba(167,139,250,0.5)"/>

  <!-- sessions → workflows -->
  <line x1="95" y1="112" x2="95" y2="200" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
  <polygon points="95,200 92,194 98,194" fill="rgba(167,139,250,0.7)"/>

  <!-- workflows → workflow_agents -->
  <line x1="170" y1="260" x2="390" y2="260" stroke="rgba(167,139,250,0.5)" stroke-width="1"/>
  <polygon points="390,260 384,257 384,263" fill="rgba(167,139,250,0.7)"/>

  <!-- 跨距离：sessions → summaries -->
  <line x1="170" y1="92" x2="610" y2="240" stroke="rgba(167,139,250,0.25)" stroke-width="0.8" stroke-dasharray="2,2"/>
  <polygon points="610,240 605,236 609,232" fill="rgba(167,139,250,0.4)"/>

  <!-- messages → memories (紫虚线，跨距离引用) -->
  <line x1="240" y1="162" x2="140" y2="360" stroke="rgba(167,139,250,0.4)" stroke-width="1" stroke-dasharray="2,2"/>
  <polygon points="140,360 137,354 143,354" fill="rgba(167,139,250,0.6)"/>

  <!-- messages → messages_fts (蓝虚线，FTS 镜像) -->
  <line x1="360" y1="120" x2="500" y2="360" stroke="rgba(56,189,248,0.35)" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="500,360 497,354 503,354" fill="rgba(56,189,248,0.55)"/>

  <!-- memories → memories_fts -->
  <line x1="220" y1="430" x2="440" y2="450" stroke="rgba(56,189,248,0.35)" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="440,450 434,447 434,453" fill="rgba(56,189,248,0.55)"/>

  <!-- Legend -->
  <text x="20" y="525" font-family="Iowan Old Style, Georgia, serif" font-size="11" fill="rgba(200,195,184,0.55)">
    ── 实线 = 外键关系 · ┄┄ 虚线 = 派生 / FTS 镜像 · 紫色 = memory 层 · 蓝色 = FTS5
  </text>
</svg>
